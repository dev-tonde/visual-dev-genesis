<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Tonderai Portfolio</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .offline-container {
        max-width: 400px;
        padding: 2rem;
      }
      .offline-icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 1rem;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
      }
      h1 {
        margin: 0 0 1rem 0;
        font-size: 1.5rem;
        font-weight: 600;
      }
      p {
        margin: 0 0 2rem 0;
        opacity: 0.9;
        line-height: 1.5;
      }
      .retry-btn {
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: white;
        padding: 0.75rem 1.5rem;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.3s ease;
      }
      .retry-btn:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div class="offline-container">
      <div class="offline-icon">📡</div>
      <h1>You're Offline</h1>
      <p>
        Sorry, it looks like you're not connected to the internet. Please check your connection and
        try again.
      </p>
      <button class="retry-btn" onclick="window.location.reload()">Retry</button>
    </div>
  </body>
</html>
