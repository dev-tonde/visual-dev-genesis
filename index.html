<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (() => {
        const root = document.documentElement;
        const storageKey = 'portfolio-theme';
        const legacyStorageKey = 'theme';

        try {
          const preferredTheme = localStorage.getItem(storageKey);
          const legacyTheme = localStorage.getItem(legacyStorageKey);
          const storedTheme = preferredTheme ?? legacyTheme;

          if (!preferredTheme && (legacyTheme === 'dark' || legacyTheme === 'light')) {
            localStorage.setItem(storageKey, legacyTheme);
          }

          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          const resolvedTheme =
            storedTheme === 'dark' || storedTheme === 'light'
              ? storedTheme
              : prefersDark
                ? 'dark'
                : 'light';

          root.classList.toggle('dark', resolvedTheme === 'dark');
          root.style.colorScheme = resolvedTheme;
        } catch {
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          root.classList.toggle('dark', prefersDark);
          root.style.colorScheme = prefersDark ? 'dark' : 'light';
        }
      })();
    </script>

    <!-- Inline critical CSS for fastest FCP -->
    <style>
      /* Critical CSS for initial render */
      *,
      ::before,
      ::after {
        box-sizing: border-box;
        border-width: 0;
        border-style: solid;
        border-color: #e5e7eb;
      }
      html {
        line-height: 1.5;
        -webkit-text-size-adjust: 100%;
        -moz-tab-size: 4;
        tab-size: 4;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          'Helvetica Neue',
          Arial,
          'Noto Sans',
          sans-serif;
      }
      body {
        margin: 0;
        line-height: inherit;
      }
      #root {
        min-height: 100vh;
        width: 100%;
      }
    </style>

    <!-- Basic meta tags (detailed SEO handled by SEOHead component) -->
    <meta
      name="description"
      content="Full-stack developer specializing in React, TypeScript, and modern web technologies"
    />
    <meta name="theme-color" content="#8B5CF6" />
    <meta name="color-scheme" content="dark light" />

    <title>Tonderai - Full-Stack Developer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
