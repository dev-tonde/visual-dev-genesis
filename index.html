<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Performance optimizations -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Preload critical font with font-display swap for better LCP -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" as="style" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Preload hero background image for faster LCP -->
    <link rel="preload" href="/src/assets/hero-bg.jpg" as="image" fetchpriority="high" />
    
    <!-- Prefetch DNS lookups -->
    <link rel="dns-prefetch" href="//api.github.com" />
    <link rel="dns-prefetch" href="//supabase.co" />
    
    <!-- Basic meta tags (detailed SEO handled by SEOHead component) -->
    <meta name="description" content="Full-stack developer specializing in React, TypeScript, and modern web technologies" />
    <meta name="theme-color" content="#8B5CF6" />
    <meta name="color-scheme" content="dark light" />
    
    <title>Tonderai - Full-Stack Developer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
