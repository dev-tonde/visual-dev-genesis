<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Inline critical CSS for fastest FCP -->
    <style>
      /* Critical CSS for initial render */
      *,::before,::after{box-sizing:border-box;border-width:0;border-style:solid;border-color:#e5e7eb}
      html{line-height:1.5;-webkit-text-size-adjust:100%;-moz-tab-size:4;tab-size:4;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif}
      body{margin:0;line-height:inherit}
      #root{min-height:100vh;width:100%}
    </style>
    
    <!-- Performance optimizations -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Preconnect to critical API origins -->
    <link rel="preconnect" href="https://api.github.com" crossorigin />
    <link rel="preconnect" href="https://rjoahcteuiddikmriegb.supabase.co" crossorigin />
    
    <!-- Defer font loading to prevent render blocking -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" /></noscript>
    
    <!-- Basic meta tags (detailed SEO handled by SEOHead component) -->
    <meta name="description" content="Full-stack developer specializing in React, TypeScript, and modern web technologies" />
    <meta name="theme-color" content="#8B5CF6" />
    <meta name="color-scheme" content="dark light" />
    
    <title>Tonderai - Full-Stack Developer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
