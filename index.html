<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Performance optimizations -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Critical CSS for font loading -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Prefetch DNS lookups -->
    <link rel="dns-prefetch" href="//api.github.com" />
    <link rel="dns-prefetch" href="//supabase.co" />
    
    <!-- Basic meta tags (detailed SEO handled by SEOHead component) -->
    <meta name="description" content="Full-stack developer specializing in React, TypeScript, and modern web technologies" />
    <meta name="theme-color" content="#8B5CF6" />
    <meta name="color-scheme" content="dark light" />
    
    <title>Tonderai - Full-Stack Developer</title>
    
    <!-- Critical styles for loading performance -->
    <style>
      /* Prevent FOUC (Flash of Unstyled Content) */
      html { visibility: hidden; opacity: 0; }
      html.loaded { visibility: visible; opacity: 1; transition: opacity 0.3s; }
      
      /* Loading spinner for better UX */
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0f0f23;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(139, 92, 246, 0.3);
        border-top: 3px solid #8B5CF6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Loading screen -->
    <div id="loading-screen" class="loading-screen">
      <div class="loading-spinner"></div>
    </div>
    
    <div id="root"></div>
    
    <!-- Remove loading screen once React loads -->
    <script>
      window.addEventListener('load', function() {
        document.documentElement.classList.add('loaded');
        setTimeout(function() {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.style.display = 'none';
          }
        }, 500);
      });
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
